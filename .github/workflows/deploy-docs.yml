name: Deploy Storybook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:tokens

      - run: pnpm build:docs

      - name: Deploy to production
        if: github.event_name == 'push'
        run: pnpm wrangler pages deploy apps/docs/storybook-static --project-name nacalui-docs --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy preview
        if: github.event_name == 'pull_request'
        id: preview
        run: |
          OUTPUT=$(pnpm wrangler pages deploy apps/docs/storybook-static --project-name nacalui-docs --branch ${{ github.head_ref }} 2>&1) || true
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.nacalui-docs\.pages\.dev' | tail -1)
          if [ -n "$URL" ]; then
            echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL
        if: github.event_name == 'pull_request' && steps.preview.outputs.deployment-url
        uses: actions/github-script@v8
        with:
          script: |
            const url = '${{ steps.preview.outputs.deployment-url }}';
            const body = `Storybook preview: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.startsWith('Storybook preview:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
